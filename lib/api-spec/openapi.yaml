openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: nomos
    description: NOMOS constitutional kernel state
  - name: query
    description: NOMOS query parse and evaluation
  - name: conversation
    description: NOMOS conversation suggestion (LLM-assisted, advisory only)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /nomos/state:
    get:
      operationId: getNomosState
      tags: [nomos]
      summary: Run the NOMOS constitutional kernel and return full system state
      parameters:
        - name: scenario
          in: query
          required: false
          schema:
            type: string
            enum: [lawful_baseline, refused_infeasible]
          description: Demo scenario to run. Defaults to current default scenario.
      responses:
        "200":
          description: Full NOMOS kernel run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NomosState"

  /nomos/query/parse:
    post:
      operationId: parseNomosQuery
      tags: [query]
      summary: >
        Extract a structured NomosQuery from natural language input.
        Does NOT assign lawfulness — extraction only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseQueryRequest"
      responses:
        "200":
          description: Structured NomosQuery extracted from input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NomosQuery"
        "400":
          description: rawInput missing or empty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Parser failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /nomos/query/evaluate:
    post:
      operationId: evaluateNomosQuery
      tags: [query]
      summary: >
        Evaluate a NomosQuery through the full constitutional pipeline.
        Deterministic matcher runs first; LLM semantic evaluator is a fallback
        for UNKNOWN constraint kinds only.
        LAWFUL / DEGRADED / INVALID is the authoritative machine verdict.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateQueryRequest"
      responses:
        "200":
          description: Evaluation result with per-candidate verdicts and margin scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationResult"
        "400":
          description: query object missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Evaluation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /nomos/conversation/suggest:
    post:
      operationId: conversationSuggest
      tags: [conversation]
      summary: >
        LLM-assisted refinement suggestions for the conversation engine.
        ADVISORY ONLY — suggestions do not carry authority and are never
        used as ground truth for evaluation.
        Returns empty array when OPENAI_API_KEY is absent (rule-based fallback).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationSuggestRequest"
      responses:
        "200":
          description: Suggestion list (may be empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSuggestResponse"

components:
  schemas:

    # ── Shared primitives ────────────────────────────────────────────────────

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    # ── Query types (mirrors packages/constitutional-kernel/src/query/query_types.ts) ──

    SubmissionCompleteness:
      type: string
      enum: [COMPLETE, PARTIAL, INSUFFICIENT]

    ParserConfidence:
      type: string
      enum: [HIGH, MEDIUM, LOW]

    NomosStateBlock:
      type: object
      properties:
        description:
          type: string
        facts:
          type: array
          items:
            type: string
        constraints:
          type: array
          items:
            type: string
        uncertainties:
          type: array
          items:
            type: string
      required: [description, facts, constraints, uncertainties]

    NomosCandidateBlock:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
      required: [id, description]

    NomosObjectiveBlock:
      type: object
      properties:
        description:
          type: string
      required: [description]

    NomosQuery:
      type: object
      properties:
        rawInput:
          type: string
        state:
          $ref: "#/components/schemas/NomosStateBlock"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/NomosCandidateBlock"
        objective:
          $ref: "#/components/schemas/NomosObjectiveBlock"
          nullable: true
        parserConfidence:
          $ref: "#/components/schemas/ParserConfidence"
        completeness:
          $ref: "#/components/schemas/SubmissionCompleteness"
        notes:
          type: array
          items:
            type: string
      required: [rawInput, state, candidates, parserConfidence, completeness, notes]

    ParseQueryRequest:
      type: object
      properties:
        rawInput:
          type: string
        operatorHints:
          type: array
          items:
            type: string
        allowFallback:
          type: boolean
      required: [rawInput]

    EvaluateQueryRequest:
      type: object
      properties:
        query:
          $ref: "#/components/schemas/NomosQuery"
      required: [query]

    # ── Evaluation types (mirrors packages/constitutional-kernel/src/evaluation/eval_types.ts) ──

    CandidateStatus:
      type: string
      enum: [LAWFUL, DEGRADED, INVALID]

    MarginLabel:
      type: string
      enum: [HIGH, MODERATE, LOW, FAILED]

    EvaluatorConfidence:
      type: string
      enum: [high, moderate, low]

    CandidateEvaluation:
      type: object
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/CandidateStatus"
        reason:
          type: string
        decisiveVariable:
          type: string
        adjustments:
          type: array
          nullable: true
          items:
            type: string
        confidence:
          $ref: "#/components/schemas/EvaluatorConfidence"
        marginScore:
          type: number
          minimum: 0
          maximum: 1
        marginLabel:
          $ref: "#/components/schemas/MarginLabel"
      required: [id, status, reason, decisiveVariable, confidence, marginScore, marginLabel]

    EvaluationResult:
      type: object
      properties:
        overallStatus:
          $ref: "#/components/schemas/CandidateStatus"
        lawfulSet:
          type: array
          items:
            type: string
        candidateEvaluations:
          type: array
          items:
            $ref: "#/components/schemas/CandidateEvaluation"
        decisiveVariable:
          type: string
        notes:
          type: array
          items:
            type: string
        bestCandidateId:
          type: string
          nullable: true
        strongestMarginScore:
          type: number
          nullable: true
        weakestAdmissibleMarginScore:
          type: number
          nullable: true
      required: [overallStatus, lawfulSet, candidateEvaluations, decisiveVariable, notes]

    # ── Conversation types ────────────────────────────────────────────────────

    ConversationSuggestionType:
      type: string
      enum: [constraint, intent, assumption]

    ConversationSuggestionConfidence:
      type: string
      enum: [low, moderate, high]

    ConversationSuggestion:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        type:
          $ref: "#/components/schemas/ConversationSuggestionType"
        confidence:
          $ref: "#/components/schemas/ConversationSuggestionConfidence"
      required: [id, text, type, confidence]

    ConversationSuggestRequest:
      type: object
      properties:
        stage:
          type: string
        input:
          type: string

    ConversationSuggestResponse:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/ConversationSuggestion"
      required: [suggestions]

    # ── Kernel state types (existing — retained) ─────────────────────────────

    NomosVerificationStatus:
      type: string
      enum: [LAWFUL, DEGRADED, INVALID]

    NomosAuthorityDecision:
      type: string
      enum: [AUTHORIZED, CONSTRAINED, REFUSED]

    NomosActionOutcome:
      type: string
      enum: [APPLIED, DEGRADED_ACTION_APPLIED, REFUSED]

    NomosConfidenceBand:
      type: string
      enum: [HIGH, MEDIUM, LOW, UNKNOWN]

    NomosProposal:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [CONTROL_PLAN, STATE_HYPOTHESIS, PARAMETER_HYPOTHESIS, RECOVERY_ACTION, OBJECTIVE_REFRAME]
        confidence:
          $ref: "#/components/schemas/NomosConfidenceBand"
        rationale:
          type: string
        assumptions:
          type: array
          items:
            type: string
        lawful:
          type: boolean
        planSketch:
          type: object
          nullable: true
          properties:
            controlSequence:
              type: array
              items:
                type: array
                items:
                  type: number
            rationale:
              type: string
            assumptions:
              type: array
              items:
                type: string
          required: [controlSequence, rationale, assumptions]
        provenance:
          type: array
          items:
            type: string
        notes:
          type: array
          items:
            type: string
      required: [id, kind, confidence, rationale, assumptions, lawful, provenance, notes]

    NomosVerificationMatrix:
      type: object
      properties:
        feasibilityOk:
          type: boolean
        robustnessOk:
          type: boolean
        observabilityOk:
          type: boolean
        identifiabilityOk:
          type: boolean
        modelOk:
          type: boolean
        adaptationOk:
          type: boolean
        status:
          $ref: "#/components/schemas/NomosVerificationStatus"
        reasons:
          type: array
          items:
            type: string
      required: [feasibilityOk, robustnessOk, observabilityOk, identifiabilityOk, modelOk, adaptationOk, status, reasons]

    NomosBeliefSnapshot:
      type: object
      properties:
        xHat:
          type: array
          items:
            type: number
        epsilonX:
          type: number
        confidence:
          type: string
        identifiability:
          type: string
        staleByMs:
          type: number
        thetaMean:
          type: object
          additionalProperties:
            type: number
        thetaVariance:
          type: object
          nullable: true
          additionalProperties:
            type: number
        provenance:
          type: array
          items:
            type: string
        lower:
          type: array
          nullable: true
          items:
            type: number
        upper:
          type: array
          nullable: true
          items:
            type: number
      required: [xHat, epsilonX, confidence, identifiability, staleByMs, thetaMean, provenance]

    NomosModelSnapshot:
      type: object
      properties:
        activeModelId:
          type: string
        version:
          type: string
        delayAware:
          type: boolean
        confidenceScore:
          type: number
        degraded:
          type: boolean
        fallbackActive:
          type: boolean
      required: [activeModelId, version, delayAware, confidenceScore, degraded, fallbackActive]

    NomosDecisionSnapshot:
      type: object
      properties:
        selectedPlanId:
          type: string
        rankedCandidateCount:
          type: number
        rejectedCandidateCount:
          type: number
        robustnessEpsilon:
          type: number
        robustnessEpsilonMin:
          type: number
        topRejectionReason:
          type: string
          nullable: true
      required: [selectedPlanId, rankedCandidateCount, rejectedCandidateCount, robustnessEpsilon, robustnessEpsilonMin]

    NomosAuditSnapshot:
      type: object
      properties:
        recordId:
          type: string
        timestamp:
          type: number
        outcome:
          $ref: "#/components/schemas/NomosActionOutcome"
        verificationStatus:
          $ref: "#/components/schemas/NomosVerificationStatus"
        appliedControl:
          type: array
          items:
            type: number
        notes:
          type: array
          items:
            type: string
      required: [recordId, timestamp, outcome, verificationStatus, appliedControl, notes]

    NomosState:
      type: object
      properties:
        runId:
          type: string
        timestamp:
          type: number
        missionId:
          type: string
        scenario:
          type: string
        verificationStatus:
          $ref: "#/components/schemas/NomosVerificationStatus"
        authority:
          $ref: "#/components/schemas/NomosAuthorityDecision"
        actionOutcome:
          $ref: "#/components/schemas/NomosActionOutcome"
        modelConfidenceScore:
          type: number
        proposalCount:
          type: number
        rejectedFragmentCount:
          type: number
        proposalReasons:
          type: array
          items:
            type: string
        proposals:
          type: array
          items:
            $ref: "#/components/schemas/NomosProposal"
        verification:
          $ref: "#/components/schemas/NomosVerificationMatrix"
        belief:
          $ref: "#/components/schemas/NomosBeliefSnapshot"
        model:
          $ref: "#/components/schemas/NomosModelSnapshot"
        decision:
          $ref: "#/components/schemas/NomosDecisionSnapshot"
        audit:
          $ref: "#/components/schemas/NomosAuditSnapshot"
      required:
        - runId
        - timestamp
        - missionId
        - scenario
        - verificationStatus
        - authority
        - actionOutcome
        - modelConfidenceScore
        - proposalCount
        - rejectedFragmentCount
        - proposalReasons
        - proposals
        - verification
        - belief
        - model
        - decision
        - audit
