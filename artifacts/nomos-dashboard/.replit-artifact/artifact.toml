kind = "web"
previewPath = "/"
title = "NOMOS Dashboard"
version = "1.0.0"
id = "artifacts/nomos-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24280

[services.development]
run = "pnpm --filter @workspace/nomos-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nomos-dashboard", "run", "build" ]
publicDir = "artifacts/nomos-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24280"
BASE_PATH = "/"
